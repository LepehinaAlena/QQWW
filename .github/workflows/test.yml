name: ARM Memory Reorder Test

on: [push]

jobs:
  test-arm:
    runs-on: ubuntu-24.04-arm  # ARM64 runner!
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Compile
      run: |
        g++ -O2 -pthread reorder_arm.cpp -o reorder_arm
    
    - name: Run test
      run: |
        ./reorder_arm
